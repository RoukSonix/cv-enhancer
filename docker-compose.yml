services:
  db:
    image: postgres:17-alpine
    container_name: cv-enhancer-db
    environment:
      POSTGRES_USER: cvenhancer
      POSTGRES_PASSWORD: cvenhancer
      POSTGRES_DB: cvenhancer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvenhancer"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: cv-enhancer
    ports:
      - "8601:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://cvenhancer:cvenhancer@db:5432/cvenhancer
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/src/generated  # preserve prisma generated client from build
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: cv-enhancer-stripe
    entrypoint: ["sh", "-c", "stripe listen --forward-to http://app:3000/api/webhooks/stripe --api-key $$STRIPE_SECRET_KEY"]
    env_file:
      - .env.stripe
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - stripe

volumes:
  pgdata:
